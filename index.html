  <body style="background-color: #000000;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!--Start of Tawk.to Script-->
    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
      function loadTawk() {
        if (window.tawkLoaded) return;
        window.tawkLoaded = true;
        
        // Remove event listeners to clean up
        window.removeEventListener('scroll', loadTawk);
        window.removeEventListener('touchstart', loadTawk);
        clearTimeout(tawkTimeout);

        var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
        s1.async=true;
        s1.src='https://embed.tawk.to/6a57359cfac3bf1d464b583f/1jtiair4b';
        s1.charset='UTF-8';
        s0.parentNode.insertBefore(s1,s0);
      }

      var tawkTimeout;
      // If mobile view, lazy-load Tawk.to on interaction or delay
      if (window.innerWidth <= 768) {
        window.addEventListener('scroll', loadTawk, { passive: true });
        window.addEventListener('touchstart', loadTawk, { passive: true });
        tawkTimeout = setTimeout(loadTawk, 5000); // 5s fallback
      } else {
        // Desktop loads immediately
        loadTawk();
      }
    })();
    </script>
    <!--End of Tawk.to Script-->
  </body>
